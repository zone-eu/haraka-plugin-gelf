[main]

; Enable/disable GELF logging
enabled = true

; Enable/disable Haraka log hook
;   true - all logged messages are forwarded to graylog.
;  false - only messages logged over `server.notes.loggelf` API are forwarded to graylog
log_hook_enabled = true

; Graylog URL
url = udp://localhost:12201

; If true, no further log plugins will be called after this one
last = false

; Per-plugin override examples
;[plugin.core]
;enabled = false

;[plugin.wildduck]
;log_hook_enabled=true
;url = udp4://wildduck-graylog.example.com:12201
